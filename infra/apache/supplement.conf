<VirtualHost *:80>
    ServerName supplement.billytheboy.com
    Redirect permanent / https://supplement.billytheboy.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName supplement.billytheboy.com

    # SSL — gestionado por Certbot
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/supplement.billytheboy.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/supplement.billytheboy.com/privkey.pem

    # Frontend (Next.js)
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # WebSocket support (Next.js HMR en dev no aplica en prod, pero por si acaso)
    RewriteEngine on
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:3000/$1" [P,L]

    ErrorLog ${APACHE_LOG_DIR}/supplement_error.log
    CustomLog ${APACHE_LOG_DIR}/supplement_access.log combined
</VirtualHost>
