services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: supplement_ai
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python seed.py &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  frontend:
    build:
      context: ./frontend
      target: runner
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=https://supplement.billytheboy.com/api
    depends_on:
      - backend

volumes:
  pgdata:
